services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: envoy
      POSTGRES_USER: envoy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envoy"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://envoy:${POSTGRES_PASSWORD}@postgres:5432/envoy
      NODE_ENV: production
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ollama:                          # optional — only starts if LLM_PROVIDER=ollama
    image: ollama/ollama
    profiles: ["sovereign"]        # docker compose --profile sovereign up
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  postgres_data:
  ollama_data:
